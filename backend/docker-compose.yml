services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/failure_playground
      ENVIRONMENT: docker-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker-a:
    build: .
    command: python worker.py
    environment:
      WORKER_NAME: worker-a
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/failure_playground
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  worker-b:
    build: .
    command: python worker.py
    environment:
      WORKER_NAME: worker-b
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/failure_playground
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: failure_playground
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d failure_playground"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: