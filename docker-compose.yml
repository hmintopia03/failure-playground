services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/failure_playground
      ENVIRONMENT: docker-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  worker-a:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python worker.py
    environment:
      WORKER_NAME: worker-a
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/failure_playground
    volumes:
      - ./backend:/app
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  worker-b:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python worker.py
    environment:
      WORKER_NAME: worker-b
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/failure_playground
    volumes:
      - ./backend:/app
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  redis:
    image: redis:7
    ports:
      - "6380:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: failure_playground
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d failure_playground"]
      interval: 2s
      timeout: 5s
      retries: 10
  prometheus:
    image: prom/prometheus:latest
    container_name: failure-playground-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
  grafana:
    image: grafana/grafana:latest
    container_name: failure-playground-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:

